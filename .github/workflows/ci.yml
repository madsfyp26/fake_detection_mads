name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-venv.txt pytest soundfile

      - name: Syntax check
        run: python -m compileall .

      - name: Run tests
        run: pytest -q
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run smoke test
        run: python smoke_test.py

